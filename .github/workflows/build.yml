name: Build ESPRESSObin Bootloader

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [v5_2GB, v7_1GB]
        include:
          - target: v5_2GB
            clock: CPU_1200_DDR_750
            topology: 7
          - target: v7_1GB
            clock: CPU_1200_DDR_750
            topology: 5
            
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install Cross-Compilation Toolchains & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64 gcc-arm-linux-gnueabi device-tree-compiler bison flex libssl-dev bc make git python3 python3-setuptools python-is-python3 libgnutls28-dev uuid-dev libcrypto++-dev
          
      - name: Clone bschnei ebu-bootloader fork
        run: |
          # Bypass gitlab.nic.cz 403 blocks in GitHub Actions by forcing the public GitHub mirror
          git config --global url."https://github.com/turris-cz/".insteadOf "https://gitlab.nic.cz/turris/"
          git clone --recursive https://github.com/bschnei/ebu-bootloader.git workspace

      - name: Configure and Build Bootloader
        working-directory: ./workspace
        run: |
          # Force the standard layout config instead of the hardcoded Ultra variant
          sed -i 's/mvebu_espressobin_ultra-88f3720_defconfig/mvebu_espressobin-88f3720_defconfig/g' Makefile
          make \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_CM3=arm-linux-gnueabi- \
            DEBUG=0 \
            USE_COHERENT_MEM=0 \
            LOG_LEVEL=20 \
            PLAT=a3700 \
            CLOCKSPRESET=${{ matrix.clock }} \
            DDR_TOPOLOGY=${{ matrix.topology }} \
            BOOTDEV=SPINOR \
            PARTNUM=0 \
            WERROR=0 \
            all
            
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: espressobin-${{ matrix.target }}-bootloader
          path: workspace/trusted-firmware-a/build/a3700/release/flash-image.bin
